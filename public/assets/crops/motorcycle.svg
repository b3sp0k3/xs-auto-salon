<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 230" role="img" aria-labelledby="title desc">
  <title id="title">Motorcycles</title>
  <desc id="desc">A red and black sport motorcycle in a dark detailing studio.</desc>
  <defs>
    <radialGradient id="floorGlow" cx="50%" cy="76%" r="55%">
      <stop offset="0" stop-color="#2a2a2a" stop-opacity=".8"/>
      <stop offset=".48" stop-color="#090909" stop-opacity=".95"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="redPaint" x1="20%" y1="15%" x2="84%" y2="76%">
      <stop offset="0" stop-color="#ff2636"/>
      <stop offset=".48" stop-color="#d70b22"/>
      <stop offset="1" stop-color="#65030d"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f6f6"/>
      <stop offset=".35" stop-color="#8d8d8d"/>
      <stop offset="1" stop-color="#121212"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-40%" width="140%" height="190%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="7" result="offset"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope=".65"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="340" height="230" fill="#000"/>
  <rect y="112" width="340" height="118" fill="url(#floorGlow)"/>
  <path d="M0 178c47-12 90-17 132-14 41 3 85 15 132 12 30-2 56-9 76-18v72H0z" fill="#050505" opacity=".74"/>

  <g transform="translate(0 6)">
    <text x="30" y="30" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" font-style="italic" letter-spacing="1.5">MOTORCYCLES</text>
    <rect x="30" y="47" width="52" height="3" fill="#d70b22"/>
  </g>

  <g filter="url(#softShadow)" transform="translate(12 18)">
    <ellipse cx="95" cy="160" rx="44" ry="12" fill="#000" opacity=".72"/>
    <ellipse cx="235" cy="160" rx="48" ry="12" fill="#000" opacity=".72"/>

    <circle cx="86" cy="146" r="34" fill="#050505" stroke="#282828" stroke-width="7"/>
    <circle cx="86" cy="146" r="18" fill="#090909" stroke="#5c5c5c" stroke-width="3"/>
    <circle cx="235" cy="146" r="37" fill="#050505" stroke="#2c2c2c" stroke-width="7"/>
    <circle cx="235" cy="146" r="19" fill="#090909" stroke="#5f5f5f" stroke-width="3"/>

    <path d="M83 145 136 110 178 139 235 145" fill="none" stroke="#d8d8d8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M126 113 155 82 202 87 232 121 176 137z" fill="url(#redPaint)"/>
    <path d="M154 80c17-15 39-20 68-11 12 4 20 10 25 18l-49 3c-19 1-33-2-44-10z" fill="#111"/>
    <path d="M103 119c22-26 53-41 93-45l-18 42c-30 1-55 5-75 13z" fill="url(#redPaint)"/>
    <path d="M165 107c28-3 54 0 77 8l-28 24-36-2z" fill="#111"/>
    <path d="M218 79h38l25 20-42-2z" fill="#d70b22"/>
    <path d="M252 92h36" stroke="#d8d8d8" stroke-width="5" stroke-linecap="round"/>
    <path d="M241 89 266 59" stroke="#a8a8a8" stroke-width="5" stroke-linecap="round"/>
    <path d="M266 59h30" stroke="#e6e6e6" stroke-width="5" stroke-linecap="round"/>
    <path d="M123 129c26 12 58 16 96 11" fill="none" stroke="#fff" stroke-opacity=".78" stroke-width="3" stroke-linecap="round"/>
    <path d="M129 88c26-9 58-15 91-7" fill="none" stroke="#fff" stroke-opacity=".52" stroke-width="3" stroke-linecap="round"/>
    <path d="M80 145c24-26 64-45 96-48" fill="none" stroke="#d70b22" stroke-width="5" stroke-linecap="round"/>
    <path d="M201 91c18 12 30 31 34 54" fill="none" stroke="#d70b22" stroke-width="5" stroke-linecap="round"/>
    <path d="M55 146c5-24 18-41 39-50" fill="none" stroke="url(#metal)" stroke-width="5" stroke-linecap="round"/>
    <path d="M238 145c9-24 25-40 49-49" fill="none" stroke="url(#metal)" stroke-width="5" stroke-linecap="round"/>
  </g>
